# E3: Attack Robustness Matrix
# Full factorial: 5 attacks × 6 defenses × 3 intensities = 90 runs

experiment:
  name: "E3_attack_robustness"
  description: "Full 5×6×3 attack robustness evaluation"

attacks:
  - type: "random_poison"
  - type: "model_poison"
  - type: "label_flip"
  - type: "free_rider"
  - type: "sybil"
    sybil: { num_sybils: 5 }

defenses:
  - strategy: "fedavg"
    signguard: { enabled: false }
  - strategy: "krum"
    signguard: { enabled: false }
  - strategy: "trimmed_mean"
    signguard: { enabled: false }
  - strategy: "foolsgold"
    signguard: { enabled: false }
  - strategy: "signguard"
    signguard: { enabled: true }
  - strategy: "no_defense"
    signguard: { enabled: false }

intensities:
  # Fraction of compromised clients
  - 0.10
  - 0.20
  - 0.30
